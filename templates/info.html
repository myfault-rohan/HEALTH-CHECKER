{% extends "base.html" %}

{% block title %}Patient Profile | Health Checker Pro{% endblock %}

{% block content %}
<section class="card border-0 shadow-sm">
    <div class="card-body p-4 p-lg-5">
        <div class="mb-4">
            <h1 class="h3 mb-2"><i class="fa-solid fa-id-card-clip me-2 text-primary"></i>Step 1: Patient Information</h1>
            <p class="text-secondary mb-0">Accurate age and gender improve confidence ranking and urgency interpretation.</p>
        </div>

        <form action="{{ url_for('info') }}" method="post" class="row g-3">
            <div class="col-md-6">
                <label class="form-label fw-semibold" for="age">Age</label>
                <input id="age" type="number" name="age" class="form-control form-control-lg" min="1" max="120" value="{{ age }}" required>
            </div>
            <div class="col-md-6">
                <label class="form-label fw-semibold" for="gender">Gender</label>
                <select id="gender" name="gender" class="form-select form-select-lg" required>
                    <option value="">Select gender</option>
                    <option value="male" {% if gender == 'male' %}selected{% endif %}>Male</option>
                    <option value="female" {% if gender == 'female' %}selected{% endif %}>Female</option>
                    <option value="other" {% if gender == 'other' %}selected{% endif %}>Other</option>
                </select>
            </div>
            <div class="col-12 d-flex flex-wrap gap-2 mt-3">
                <button type="submit" class="btn btn-primary btn-lg rounded-pill px-4 pulse-btn">
                    Continue to Symptoms
                </button>
                <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary btn-lg rounded-pill px-4">
                    Back to Dashboard
                </a>
            </div>
        </form>
    </div>
</section>
{% endblock %}
