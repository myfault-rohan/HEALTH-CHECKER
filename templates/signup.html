{% extends "base.html" %}

{% block title %}Create Account | Health Checker Pro{% endblock %}

{% block content %}
<section class="auth-shell">
    <div class="card border-0 shadow-lg auth-card-modern">
        <div class="card-body p-4 p-lg-5">
            <h1 class="h3 mb-2">Create Account</h1>
            <p class="text-secondary mb-4">Securely save your checks and revisit past analyses.</p>
            <form action="{{ url_for('signup') }}" method="post" class="vstack gap-3">
                <div>
                    <label for="email" class="form-label fw-semibold">Email</label>
                    <input id="email" type="email" name="email" autocomplete="email" class="form-control form-control-lg" required>
                </div>
                <div>
                    <label for="password" class="form-label fw-semibold">Password</label>
                    <input id="password" type="password" name="password" autocomplete="new-password" class="form-control form-control-lg" minlength="6" required>
                </div>
                <div>
                    <label for="confirm_password" class="form-label fw-semibold">Confirm Password</label>
                    <input id="confirm_password" type="password" name="confirm_password" autocomplete="new-password" class="form-control form-control-lg" minlength="6" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg rounded-pill pulse-btn">Create Account</button>
            </form>
            <p class="small text-secondary mt-3 mb-0">Already registered? <a href="{{ url_for('login') }}">Login</a></p>
        </div>
    </div>
</section>
{% endblock %}
