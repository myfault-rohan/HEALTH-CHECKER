{% extends "base.html" %}

{% block title %}Create Account | Health Checker Pro{% endblock %}

{% block content %}
<div class="auth-page-wrapper">
    <section class="glass-panel auth-card p-4 p-lg-5" data-aos="fade-up">
        <div class="text-center mb-4">
            <span class="soft-badge mb-3">Free Account</span>
            <h1 class="h2 mb-2">Create your profile</h1>
            <p class="text-muted mb-0">Join the app with stronger password requirements and immediate dashboard access.</p>
        </div>
        <form action="{{ url_for('signup') }}" method="post" class="vstack gap-3">
            <div data-aos="fade-up" data-aos-delay="50">
                <label for="email" class="form-label fw-semibold">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-regular fa-envelope"></i></span>
                    <input id="email" type="email" name="email" autocomplete="email" placeholder="you@example.com" class="form-control" required>
                </div>
            </div>
            <div data-aos="fade-up" data-aos-delay="100">
                <label for="password" class="form-label fw-semibold">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                    <input id="password" type="password" name="password" autocomplete="new-password" placeholder="At least 8 characters" class="form-control" minlength="8" required>
                </div>
            </div>
            <div data-aos="fade-up" data-aos-delay="150">
                <label for="confirm_password" class="form-label fw-semibold">Confirm Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                    <input id="confirm_password" type="password" name="confirm_password" autocomplete="new-password" placeholder="Re-enter your password" class="form-control" minlength="8" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-lg mt-2" data-aos="fade-up" data-aos-delay="200">Create Account</button>
        </form>
        <div class="divider"></div>
        <p class="text-center mb-0">Already registered? <a href="{{ url_for('login') }}" class="text-primary fw-semibold">Sign in</a></p>
    </section>
</div>
{% endblock %}
